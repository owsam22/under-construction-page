<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Something awesome is on its way. Our website is under construction." />
    <title>Under Construction — Coming Soon</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Sora:wght@700;800&display=swap" rel="stylesheet" />
    <style>
        :root {
            --primary: #6366f1;
            --primary-soft: #eef2ff;
            --accent: #22d3ee;
            --dark: #0f172a;
            --bg: #ffffff;
            --bg-offset: #f8fafc;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --glass: rgba(255, 255, 255, 0.7);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden; /* Prevent horizontal scroll */
            position: relative;
        }

        /* --- DYNAMIC BACKGROUND & PARTICLES --- */
        .bg-container {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-element {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: drift 25s infinite alternate ease-in-out;
        }

        .bg-1 {
            width: 600px;
            height: 600px;
            background: var(--primary);
            top: -150px;
            left: -150px;
        }

        .bg-2 {
            width: 700px;
            height: 700px;
            background: var(--accent);
            bottom: -200px;
            right: -150px;
            animation-duration: 35s;
            animation-delay: -5s;
        }

        /* Particles */
        .particle {
            position: absolute;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.2;
            animation: floatParticle 15s infinite linear;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 80px) scale(1.1); }
        }

        @keyframes floatParticle {
            0% { transform: translate(0, 0); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translate(100px, -100vh); opacity: 0; }
        }


        /* --- MAIN CONTENT --- */
        .page-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            text-align: center;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--primary-soft);
            color: var(--primary);
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            border: 1px solid rgba(99, 102, 241, 0.1);
        }

        .main-hero h1 {
            font-family: 'Sora', sans-serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            line-height: 1.1;
            margin-bottom: 0.5rem;
            color: var(--dark);
            font-weight: 800;
            letter-spacing: -0.04em;
        }

        .main-hero p {
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            font-weight: 400;
            color: var(--text-sub);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 2.5rem;
        }

        /* --- HERO IMAGE --- */
        .hero-image-wrapper {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            animation: floatHero 6s ease-in-out infinite;
        }

        .hero-image {
            width: 100%;
            height: auto;
            max-height: 45vh;
            object-fit: contain;
            filter: drop-shadow(0 30px 60px rgba(99, 102, 241, 0.15));
            border-radius: 24px;
        }

        @keyframes floatHero {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-25px); }
        }

        /* --- FOOTER (Explicitly Styled) --- */
        footer {
            width: 100%;
            padding: 4rem 2rem;
            text-align: center;
            background: var(--bg-offset);
            border-top: 1px solid var(--border);
            margin-top: auto; /* Push to bottom */
        }

        .footer-divider {
            width: 50px;
            height: 3px;
            background: var(--primary);
            margin: 0 auto 2.5rem;
            border-radius: 10px;
            opacity: 0.4;
        }

        .footer-cta {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            font-family: 'Sora', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            padding: 14px 28px;
            background: var(--primary);
            border-radius: 100px;
            transition: var(--transition);
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.2);
        }

        .footer-cta:hover {
            transform: translateY(-4px);
            background: #4f46e5;
            box-shadow: 0 15px 40px rgba(99, 102, 241, 0.3);
        }

        .footer-cta svg:last-child {
            transition: transform 0.3s ease;
        }

        .footer-cta:hover svg:last-child {
            transform: translateX(5px);
        }

        .footer-credits {
            font-size: 0.95rem;
            color: var(--text-main);
            margin-bottom: 0.8rem;
        }

        .footer-credits a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-credits a:hover {
            text-decoration: underline;
        }

        .footer-bottom {
            font-size: 0.85rem;
            color: var(--text-sub);
        }

        @media (max-width: 600px) {
            .page-wrapper { padding: 2rem 1.5rem; }
            .footer-cta { width: 100%; justify-content: center; }
            .hero-image { max-height: 35vh; }
        }
    </style>
</head>
<body>

    <!-- Dynamic Background -->
    <div class="bg-container" id="bg-container">
        <div class="bg-element bg-1"></div>
        <div class="bg-element bg-2"></div>
        <!-- Particles added via script -->
    </div>
    


    <main class="page-wrapper">
        <div class="status-badge" role="status">
            Something Great is Coming
        </div>

        <div class="main-hero">
            <h1>We're building for you</h1>
            <p>Under Construction &bull; Coming Soon</p>
        </div>

        <div class="hero-image-wrapper">
            <img 
                src="https://cdni.iconscout.com/illustration/premium/thumb/coder-illustration-svg-download-png-2895977.png" 
                alt="Coder Illustration" 
                class="hero-image"
            />
        </div>
    </main>

    <footer>
      <div class="footer-divider" aria-hidden="true"></div>

      <!-- GitHub cta-->
      <a
        href="https://github.com/owsam22/under-construction-page"
        target="_blank"
        rel="noopener noreferrer"
        class="footer-cta"
        id="github-cta"
        aria-label="View this template on GitHub"
      >
        <!-- GitHub icon -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
        </svg>
        Want your own under construction page?
        <!-- Arrow -->
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </a>

      <!-- Credits -->
      <p class="footer-credits">
        Crafted with ♥ by
        <a href="https://github.com/owsam22" target="_blank" rel="noopener noreferrer">owsam22</a>
      </p>
      <p class="footer-bottom">&copy; <span id="year"></span> — Free to use &amp; open source</p>
    </footer>

    <script>
      // Update year automatically
      document.getElementById('year').textContent = new Date().getFullYear();



      // Create particles
      const container = document.getElementById('bg-container');
      const particleCount = 20;

      for (let i = 0; i < particleCount; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        
        // Random size
        const size = Math.random() * 5 + 2 + 'px';
        p.style.width = size;
        p.style.height = size;
        
        // Random position
        p.style.left = Math.random() * 100 + 'vw';
        p.style.top = Math.random() * 100 + 'vh';
        
        // Random animation delay and duration
        p.style.animationDelay = Math.random() * 15 + 's';
        p.style.animationDuration = Math.random() * 10 + 10 + 's';
        
        container.appendChild(p);
      }
    </script>
</body>
</html>
